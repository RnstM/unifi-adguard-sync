apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-adguard-sync
  namespace: default
  labels:
    app: unifi-adguard-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unifi-adguard-sync
  template:
    metadata:
      labels:
        app: unifi-adguard-sync
    spec:
      containers:
        - name: sync
          image: ghcr.io/RnstM/unifi-adguard-sync:latest  # update to your image
          imagePullPolicy: Always
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          env:
            # Credentials from Secret
            - name: UNIFI_USER
              valueFrom:
                secretKeyRef:
                  name: unifi-adguard-sync
                  key: UNIFI_USER
            - name: UNIFI_PASS
              valueFrom:
                secretKeyRef:
                  name: unifi-adguard-sync
                  key: UNIFI_PASS
            - name: ADGUARD_USER
              valueFrom:
                secretKeyRef:
                  name: unifi-adguard-sync
                  key: ADGUARD_USER
            - name: ADGUARD_PASS
              valueFrom:
                secretKeyRef:
                  name: unifi-adguard-sync
                  key: ADGUARD_PASS
            # Non-sensitive config
            - name: UNIFI_HOST
              value: "https://192.168.1.1"
            - name: UNIFI_SITE
              value: "default"
            - name: UNIFI_VERIFY_SSL
              value: "false"
            - name: ADGUARD_HOST
              value: "http://adguard.default.svc.cluster.local"
            - name: SYNC_INTERVAL
              value: "300"
            - name: LOG_LEVEL
              value: "INFO"
            - name: HEALTH_PORT
              value: "8080"
            # Dry-run: set to "true" to preview changes without writing to AdGuard
            - name: DRY_RUN
              value: "false"
            # VLAN filtering (optional — pick one or neither)
            # - name: INCLUDE_VLANS
            #   value: "10,20,30"
            # - name: EXCLUDE_VLANS
            #   value: "99,100"
            # Stale client cleanup (optional)
            - name: STALE_AFTER_DAYS
              value: "0"           # set to e.g. "30" to enable
            - name: STATE_FILE
              value: "/data/state.json"
            # VLAN -> OS tag fallback (optional)
            # - name: VLAN_OS_MAP
            #   value: "200:os_windows,300:os_linux"
          volumeMounts:
            - name: state
              mountPath: /data
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      volumes:
        # emptyDir resets on pod restart — good enough when STALE_AFTER_DAYS is disabled.
        # For persistence across restarts, replace with a PVC (see below).
        - name: state
          emptyDir: {}
        # Persistent state across pod restarts:
        # - name: state
        #   persistentVolumeClaim:
        #     claimName: unifi-adguard-sync-state
      restartPolicy: Always
      securityContext:
        seccompProfile:
          type: RuntimeDefault

---

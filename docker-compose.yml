services:
  unifi-adguard-sync:
    image: ghcr.io/rnstm/unifi-adguard-sync:latest
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - unifi-adguard-sync-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8888/api/status')"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  unifi-adguard-sync-data:

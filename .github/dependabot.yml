version: 2
updates:
  # Python dependencies
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      python-deps:
        patterns: ["*"]

  # Frontend (npm) dependencies
  - package-ecosystem: npm
    directory: /dashboard
    schedule:
      interval: weekly
      day: monday
    groups:
      npm-deps:
        patterns: ["*"]

  # Docker base image
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns: ["*"]
